services:
  db:
    image: postgres:16
    container_name: gechu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gechu
      POSTGRES_USER: gechu
      POSTGRES_PASSWORD: gechu_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: