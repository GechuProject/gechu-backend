name: Code Quality Checks

# develop, main 브랜치를 상대로 풀 리퀘스트가 생성될 때 CI가 실행됩니다.
on:
  pull_request:
    branches:
      - "main"
      - "dev"
  push:
    branches:
      - "main"
      - "dev"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v4
        with:
          key: poetry-2.0.0
          path: ~/.local/ # poetry 의 실제 설치 경로를 통째로 캐시함.

      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      # 포에트리 실행 경로 등록 (Poetry 2.0 및 최신 설치 스크립트 기준)
      - name: Register Poetry bin
        run: echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        id: cache-venv
        uses: actions/cache@v4
        with:
          key: python-${{ steps.setup-python.outputs.python-version }}-poetry-lock-${{ hashFiles('poetry.lock') }}-toml-${{ hashFiles('pyproject.toml') }}-poetry-2.0.0
          path: ~/.cache/pypoetry/virtualenvs/

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-root

      - name: Run Ruff (Lint & Format Check)
        run: |
          poetry run ruff format . --check
          poetry run ruff check .

      - name: Set multiline environment variable
        run: |
          mkdir -p envs
          echo "${{ secrets.DJANGO_ENVS }}" >> envs/.local.env

      - name: Run Mypy
        run: poetry run mypy .

  test:
    needs: ci
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: game_db
          TZ: Asia/Seoul
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v4
        with:
          key: poetry-2.0.0
          path: ~/.local/

      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Register Poetry bin
        run: echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        id: cache-venv
        uses: actions/cache@v4
        with:
          key: python-${{ steps.setup-python.outputs.python-version }}-poetry-lock-${{ hashFiles('poetry.lock') }}-toml-${{ hashFiles('pyproject.toml') }}-poetry-2.0.0
          path: ~/.cache/pypoetry/virtualenvs/

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-root

      - name: Set multiline environment variable
        run: |
          mkdir -p envs
          echo "${{ secrets.DJANGO_ENVS }}" >> envs/.local.env

      - name: Run Django Migration
        run: |
          poetry run python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DB_HOST: localhost
          REDIS_HOST: localhost

      - name: Check each app has test & Run coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DB_HOST: localhost
          REDIS_HOST: localhost
        run: |
          # 순차 테스트 실행
          poetry run coverage run manage.py test --keepdb
          
          # apps 디렉터리 내의 앱들 수집
          apps=$(find apps -maxdepth 1 -mindepth 1 -type d ! -name "__pycache__" -exec basename {} \;)
          
          for app_name in $apps; do
            app_path="apps/$app_name"
            # 테스트 파일 존재 여부 확인 (tests.py 혹은 test_*.py)
            test_files=$(find "$app_path" -type f \( -name "tests.py" -o -name "test_*.py" \))
            if [ -n "$test_files" ] && grep -q "def test_" $test_files 2>/dev/null; then
              echo "📊 Coverage for apps.$app_name:"
              poetry run coverage report -m --include="$app_path/*"
              echo ""
            else
              echo "⚠️  No test functions found in apps.$app_name"
            fi
          done
          
          echo "======================="
          echo "📊 Total Coverage Report:"
          poetry run coverage report -m